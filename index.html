<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新文化式原型產生器|Bunka Pattern Generator</title>
<style>
:root{--ink:#2b2622;--accent:#8a5a3b;--bg:#faf7f2}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  color:var(--ink);
  background:radial-gradient(ellipse 90% 70% at 50% 32%, #ffffff 0%, var(--bg) 55%, #efe7db 100%);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
header{text-align:center;padding:56px 20px 6px}
h1{font-size:2rem;font-weight:600;letter-spacing:.14em}
.sub{margin-top:10px;color:#8d8377;font-size:.95rem;letter-spacing:.28em}
#stage{
  width:min(92vw,560px);height:min(64vh,560px);
  position:relative;
}
#stage canvas{display:block;width:100%;height:100%}
.cta{
  margin:4px 0 60px;text-align:center;
}
.cta a{
  display:inline-block;
  padding:14px 52px;
  border:1px solid var(--accent);
  border-radius:999px;
  color:var(--accent);
  text-decoration:none;
  font-size:1.05rem;
  letter-spacing:.35em;
  text-indent:.35em;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(2px);
  transition:all .25s;
}
.cta a:hover{background:var(--accent);color:#fff}
.cta p{margin-top:14px;color:#a89c8d;font-size:.78rem;letter-spacing:.1em}
footer{margin-top:auto;padding:18px;color:#b3a897;font-size:.72rem;letter-spacing:.15em}
.picker{
  position:absolute;top:50%;right:0;transform:translate(105%,-50%);
  min-width:170px;
  background:rgba(255,255,255,.92);
  border:1px solid #e2d8c9;border-radius:12px;
  padding:14px 16px;
  box-shadow:0 8px 28px rgba(90,70,50,.12);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.picker.show{opacity:1;pointer-events:auto}
.picker h3{font-size:.82rem;color:#a08c74;font-weight:600;letter-spacing:.15em;margin-bottom:8px}
.picker a{
  display:block;padding:8px 12px;margin:6px 0;
  border:1px solid var(--accent);border-radius:8px;
  color:var(--accent);text-decoration:none;font-size:.92rem;
  text-align:center;letter-spacing:.1em;transition:all .2s;
}
.picker a:hover{background:var(--accent);color:#fff}
@media (max-width:760px){
  .picker{right:50%;top:100%;transform:translate(50%,8px)}
}
</style>
</head>
<body>
<header>
  <h1>新文化式原型產生器</h1>
  <p class="sub">BUNKA PATTERN GENERATOR</p>
</header>

<div id="stage">
  <div class="picker" id="picker">
    <h3 id="pickerTitle">上半身</h3>
    <div id="pickerLinks"></div>
  </div>
</div>

<div class="cta">
  <a href="tool.html">進入打版工具</a>
  <p>上半身原型・袖・直筒裙・圓裙・褲子|SVG / 1:1 PDF</p>
</div>

<footer>依日本文化服裝學院製圖法|僅供打版參考</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  if (typeof THREE === 'undefined') return;   // CDN 失敗:保留靜態首頁

  const stage = document.getElementById('stage');
  const W = stage.clientWidth, H = stage.clientHeight;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  stage.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(32, W / H, 0.1, 50);
  camera.position.set(0, 1.05, 3.6);
  camera.lookAt(0, 0.55, 0);

  // 燈光:柔和攝影棚
  scene.add(new THREE.HemisphereLight(0xfffaf2, 0xcbbfae, 0.85));
  const key = new THREE.DirectionalLight(0xffffff, 0.75);
  key.position.set(2.5, 4, 3);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0xf2e2cf, 0.45);
  rim.position.set(-3, 2, -2.5);
  scene.add(rim);

  // ---- 陶瓷人台軀幹:橢圓斷面堆疊 ----
  // 每列:[y, 半寬, 後半深, 前半深]
  const rows = [
    [1.52, 0.115, 0.115, 0.115],
    [1.44, 0.135, 0.125, 0.125],
    [1.30, 0.375, 0.205, 0.205],
    [1.16, 0.395, 0.235, 0.275],
    [1.04, 0.385, 0.235, 0.335],
    [0.94, 0.325, 0.225, 0.265],
    [0.78, 0.272, 0.195, 0.205],
    [0.62, 0.318, 0.235, 0.225],
    [0.44, 0.408, 0.300, 0.255],
    [0.26, 0.398, 0.295, 0.245],
    [0.06, 0.330, 0.245, 0.215],
    [0.00, 0.310, 0.230, 0.205]
  ];
  // Catmull-Rom 平滑取樣
  function cr(vals, t) {
    const n = vals.length - 1, f = t * n, i = Math.floor(f), u = f - i;
    const p0 = vals[Math.max(0, i - 1)], p1 = vals[i],
          p2 = vals[Math.min(n, i + 1)], p3 = vals[Math.min(n, i + 2)];
    return 0.5 * ((2 * p1) + (-p0 + p2) * u + (2 * p0 - 5 * p1 + 4 * p2 - p3) * u * u +
           (-p0 + 3 * p1 - 3 * p2 + p3) * u * u * u);
  }
  const col = k => rows.map(r => r[k]);
  const V = 64, R = 56;                     // 縱向/環向解析度
  const pos = [], idx = [];
  for (let i = 0; i <= V; i++) {
    const t = i / V;
    const y = cr(col(0), t), w = cr(col(1), t),
          db = cr(col(2), t), df = cr(col(3), t);
    for (let j = 0; j <= R; j++) {
      const a = j / R * Math.PI * 2;
      const s = Math.sin(a);
      const d = s > 0 ? df : db;            // 前/後深度(胸型)
      pos.push(w * Math.cos(a), y, d * s);
    }
  }
  for (let i = 0; i < V; i++)
    for (let j = 0; j < R; j++) {
      const a = i * (R + 1) + j, b = a + R + 1;
      idx.push(a, b, a + 1, b, b + 1, a + 1);
    }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();

  const ceramic = new THREE.MeshPhysicalMaterial({
    color: 0xfdfdfd, roughness: 0.16, metalness: 0.0,
    clearcoat: 0.65, clearcoatRoughness: 0.22
  });
  const figure = new THREE.Group();
  figure.add(new THREE.Mesh(geo, ceramic));

  // 頸頂圓鈕
  const knob = new THREE.Mesh(new THREE.SphereGeometry(0.115, 24, 16), ceramic);
  knob.position.y = 1.54;
  figure.add(knob);
  // 底蓋
  const cap = new THREE.Mesh(new THREE.CircleGeometry(0.31, 48), ceramic);
  cap.rotation.x = Math.PI / 2;
  cap.scale.set(1, 0.68, 1);
  figure.add(cap);

  // 立座:金屬桿+圓盤底
  const metal = new THREE.MeshStandardMaterial({ color: 0x7a6a58, roughness: 0.35, metalness: 0.8 });
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.85, 20), metal);
  pole.position.y = -0.43;
  figure.add(pole);
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.38, 0.05, 48), metal);
  base.position.y = -0.86;
  figure.add(base);

  figure.position.y = -0.28;
  scene.add(figure);

  // 地面柔影
  const shCanvas = document.createElement('canvas');
  shCanvas.width = shCanvas.height = 128;
  const g = shCanvas.getContext('2d');
  const grd = g.createRadialGradient(64, 64, 8, 64, 64, 64);
  grd.addColorStop(0, 'rgba(80,64,48,0.35)');
  grd.addColorStop(1, 'rgba(80,64,48,0)');
  g.fillStyle = grd;
  g.fillRect(0, 0, 128, 128);
  const shadow = new THREE.Mesh(
    new THREE.PlaneGeometry(1.6, 1.6),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(shCanvas), transparent: true, depthWrite: false })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = -1.155;
  scene.add(shadow);

  function onResize() {
    const w2 = stage.clientWidth, h2 = stage.clientHeight;
    camera.aspect = w2 / h2;
    camera.updateProjectionMatrix();
    renderer.setSize(w2, h2);
  }
  window.addEventListener('resize', onResize);

  // ---- 滑鼠懸停:上半身/下半身 顯示對應選項 ----
  const picker = document.getElementById('picker');
  const pickerTitle = document.getElementById('pickerTitle');
  const pickerLinks = document.getElementById('pickerLinks');
  const OPTIONS = {
    upper: { title: '上半身', links: [['上半身原型(身片+袖)', 'tool.html#top']] },
    lower: { title: '下半身', links: [
      ['直筒裙', 'tool.html#tight'],
      ['圓裙', 'tool.html#circle'],
      ['褲子', 'tool.html#pants']
    ] }
  };
  let curZone = '', overPicker = false, hideTimer = null;
  picker.addEventListener('pointerenter', () => { overPicker = true; });
  picker.addEventListener('pointerleave', () => { overPicker = false; scheduleHide(); });
  function showZone(zone) {
    if (zone !== curZone) {
      curZone = zone;
      const o = OPTIONS[zone];
      pickerTitle.textContent = o.title;
      pickerLinks.innerHTML = o.links.map(([t, u]) => `<a href="${u}">${t}</a>`).join('');
    }
    clearTimeout(hideTimer);
    picker.classList.add('show');
  }
  function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => { if (!overPicker) { picker.classList.remove('show'); curZone = ''; } }, 350);
  }
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const bodyMeshes = [figure.children[0], knob];
  const WAIST_LOCAL_Y = 0.72;
  renderer.domElement.addEventListener('pointermove', e => {
    const r = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(bodyMeshes, false)[0];
    if (hit) {
      const localY = hit.point.y - figure.position.y;
      showZone(localY >= WAIST_LOCAL_Y ? 'upper' : 'lower');
      renderer.domElement.style.cursor = 'pointer';
    } else {
      renderer.domElement.style.cursor = '';
      scheduleHide();
    }
  });
  renderer.domElement.addEventListener('pointerleave', scheduleHide);
  // 點擊人台直接前往(上半身→原型;下半身→保留讓使用者選)
  renderer.domElement.addEventListener('click', () => {
    if (curZone === 'upper') location.href = 'tool.html#top';
  });

  (function loop() {
    requestAnimationFrame(loop);
    figure.rotation.y += 0.0045;
    renderer.render(scene, camera);
  })();
})();
</script>
</body>
</html>
