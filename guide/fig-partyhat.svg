<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 52" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
  <!-- 左:平面紙(缺一角的圓) -->
  <path d="M 25 26 L 30.47 10.96 A 16 16 0 1 1 19.53 10.96 Z" fill="#f3ede9" stroke="#8b5e4f" stroke-width="0.4"/>
  <line x1="25" y1="26" x2="30.47" y2="10.96" stroke="#c0392b" stroke-width="0.35" stroke-dasharray="1 0.7"/>
  <line x1="25" y1="26" x2="19.53" y2="10.96" stroke="#c0392b" stroke-width="0.35" stroke-dasharray="1 0.7"/>
  <text x="25" y="7.5" fill="#c0392b" font-size="3" text-anchor="middle">缺口＝褶子</text>
  <text x="25" y="48" fill="#555" font-size="3.2" text-anchor="middle">平面的紙</text>
  <!-- 中:箭頭 -->
  <line x1="47" y1="26" x2="59" y2="26" stroke="#8b5e4f" stroke-width="0.6"/>
