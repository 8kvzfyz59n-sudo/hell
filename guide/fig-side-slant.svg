<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 46" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
  <!-- ① c 收一點點 -->
  <polygon points="6,23.5 7.1,36 6,36" fill="#e60000" fill-opacity="0.12"/>
  <path d="M 6 23.5 C 9 22.8, 11.5 21.5, 12 18 C 12.5 15, 11.5 12, 10 9 L 18 5.5 C 18.7 8.8, 20.5 10.7, 23.5 11 L 23.5 36 L 7.1 36" fill="none" stroke="#111" stroke-width="0.25"/>
  <line x1="6" y1="23.5" x2="6" y2="36" stroke="#999" stroke-width="0.15" stroke-dasharray="0.7 0.5"/>
  <line x1="6" y1="36" x2="7.1" y2="36" stroke="#999" stroke-width="0.15" stroke-dasharray="0.7 0.5"/>
  <line x1="6" y1="23.5" x2="7.1" y2="36" stroke="#e60000" stroke-width="0.4"/>
  <text x="14.75" y="41" fill="#555" font-size="2.4" text-anchor="middle">① c 收一點點</text>
  <text x="14.75" y="44.2" fill="#888" font-size="1.9" text-anchor="middle">側縫斜得很溫和</text>
  <!-- 箭頭 -->
  <line x1="26.5" y1="20" x2="29.5" y2="20" stroke="#8b5e4f" stroke-width="0.5"/>
  <polygon points="29.5,18.7 32,20 29.5,21.3" fill="#8b5e4f"/>
  <!-- ② 一口氣扣5公分 -->
  <path d="M 39 23 C 39.6 27, 41.5 31.5, 45 36 L 40 36 L 40 23.5 Z" fill="#e60000" fill-opacity="0.12"/>
  <path d="M 39 23 C 42.2 22.3, 45.5 21.4, 46 18 C 46.5 15, 45.5 12, 44 9 L 52 5.5 C 52.7 8.8, 54.5 10.7, 57.5 11 L 57.5 36 L 45 36" fill="none" stroke="#111" stroke-width="0.25"/>
  <line x1="40" y1="23.5" x2="40" y2="36" stroke="#999" stroke-width="0.15" stroke-dasharray="0.7 0.5"/>
  <line x1="40" y1="36" x2="45" y2="36" stroke="#999" stroke-width="0.15" stroke-dasharray="0.7 0.5"/>
  <path d="M 39 23 C 39.6 27, 41.5 31.5, 45 36" fill="none" stroke="#e60000" stroke-width="0.4"/>
  <text x="38.2" y="30.5" fill="#e60000" font-size="1.9" text-anchor="end">凹進去</text>
  <text x="48.25" y="41" fill="#555" font-size="2.4" text-anchor="middle">② 一口氣扣 5 公分</text>
  <text x="48.25" y="44.2" fill="#888" font-size="1.9" text-anchor="middle">腋下外推、到腰猛收——正面輪廓整個凹進去</text>
</svg>
