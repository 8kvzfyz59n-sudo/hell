<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6 0 68 46" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
  <!-- 前片(簡化,同第一章圖1-6) -->
  <path d="M 23.5 11 L 23.5 36 L 6 36 L 6 23.5 C 9 22.8, 11.5 21.5, 12 18 C 12.5 15, 11.5 12, 10 9 L 18 5.5 C 18.7 8.8, 20.5 10.7, 23.5 11 Z" fill="none" stroke="#111" stroke-width="0.25"/>
  <!-- 原本的胸褶(袖襱,實線) -->
  <line x1="11.97" y1="14.55" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.45"/>
  <line x1="11.5" y1="19.9" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.45"/>
  <!-- 其他方向(虛線):領口/肩線/前中/下襬/脇邊 -->
  <line x1="20.6" y1="9.9" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.28" stroke-dasharray="0.9 0.6"/>
  <line x1="14" y1="7.3" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.28" stroke-dasharray="0.9 0.6"/>
  <line x1="23.5" y1="17" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.28" stroke-dasharray="0.9 0.6"/>
  <line x1="11.5" y1="36" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.28" stroke-dasharray="0.9 0.6"/>
  <line x1="6" y1="26.5" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.28" stroke-dasharray="0.9 0.6"/>
  <line x1="20.5" y1="34" x2="17.5" y2="23" stroke="#e60000" stroke-width="0.28" stroke-dasharray="0.9 0.6"/>
  <!-- BP + 360度環形箭頭 -->
  <circle cx="17.5" cy="23" r="0.45" fill="#111"/>
  <text x="18.4" y="22.2" fill="#333" font-size="2">BP</text>
  <path d="M 21.4 25.4 A 4.3 4.3 0 1 1 21.2 20.8" fill="none" stroke="#b8860b" stroke-width="0.35"/>
  <polygon points="21.2,20.8 21.1,19.25 19.9,19.95" fill="#b8860b"/>
  <!-- 說明文字 -->
  <text x="9.8" y="13.4" fill="#e60000" font-size="2.2" text-anchor="end">原型開在袖襱</text>
  <text x="27" y="12.5" fill="#555" font-size="2.2">虛線＝其他也都可以的方向：</text>
  <text x="27" y="15.8" fill="#555" font-size="2.2">領口、肩線、前中、下襬、脇邊…</text>
  <text x="27" y="21.5" fill="#b8860b" font-size="2.4" font-weight="bold">以 BP 為中心，</text>
  <text x="27" y="24.8" fill="#b8860b" font-size="2.4" font-weight="bold">360 度都可以長</text>
  <text x="14.75" y="42.5" fill="#555" font-size="2.6" text-anchor="middle">褶尖不動，開口方向隨你選</text>
</svg>
